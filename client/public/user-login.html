<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>User Login — Public Complaint Portal</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/app.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">
        <svg width="36" height="36" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.8L4.6 7 12 3.8 19.4 7 12 9.8zM4 10.4v6.6C4 20 7 22 12 22s8-2 8-5V10.4l-8 4-8-4z"/>
        </svg>
        <span>Public Complaint Portal</span>
      </a>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="submit-complaint.html">Submit</a>
        <a href="admin-login.html">Admin</a>
      </nav>

      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="container" style="padding-top:36px; padding-bottom:48px; max-width:680px;">
    <div class="card" style="padding:28px;">
      <h2 style="margin-top:0">User Login</h2>
      <p class="muted">Sign in to track and manage your complaints.</p>

      <form id="userLoginForm" style="margin-top:18px;display:grid;gap:12px;">
        <label>
          <span class="muted">Email</span>
          <input type="email" name="email" required style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit"/>
        </label>

        <label>
          <span class="muted">Password</span>
          <input type="password" name="password" required minlength="6" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit"/>
        </label>

        <div style="display:flex;gap:12px;align-items:center;justify-content:space-between;">
          <button class="btn primary" type="submit">Sign in</button>
          <a href="submit-complaint.html" class="btn ghost" style="text-decoration:none;align-self:center;">Submit without account</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <strong>Public Complaint Portal</strong>
        <p class="muted">Transparency · Accountability · Service</p>
      </div>
      <div class="footer-links">
        <a href="privacy-policy.html">Privacy</a>
        <a href="terms-of-service.html">Terms</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('userLoginForm')?.addEventListener('submit', e => {
      e.preventDefault();
      // basic stub: replace with real API call
      alert('Login attempt submitted (client stub).');
    });
  </script>
</body>
</html>
