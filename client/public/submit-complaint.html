<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Submit Complaint — Public Complaint Portal</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/app.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">
        <svg width="36" height="36" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.8L4.6 7 12 3.8 19.4 7 12 9.8zM4 10.4v6.6C4 20 7 22 12 22s8-2 8-5V10.4l-8 4-8-4z"/>
        </svg>
        <span>Public Complaint Portal</span>
      </a>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="user-login.html">User Login</a>
        <a href="admin-login.html">Admin</a>
      </nav>

      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="container" style="padding-top:36px; padding-bottom:48px; max-width:900px;">
    <div class="card" style="padding:24px;">
      <h2 style="margin-top:0">Submit a Complaint</h2>
      <p class="muted">Provide as much detail as possible. Attach photos or documents if available.</p>

      <form id="complaintForm" style="margin-top:14px;display:grid;gap:12px;">
        <div style="display:grid;grid-template-columns:1fr 200px;gap:12px;">
          <label>
            <span class="muted">Full name</span>
            <input type="text" name="name" required style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit"/>
          </label>

          <label>
            <span class="muted">Priority</span>
            <select name="priority" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit">
              <option>Normal</option>
              <option>High</option>
              <option>Urgent</option>
            </select>
          </label>
        </div>

        <label>
          <span class="muted">Email or Phone (for updates)</span>
          <input type="text" name="contact" required style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit"/>
        </label>

        <label>
          <span class="muted">Category</span>
          <select name="category" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit">
            <option>Infrastructure</option>
            <option>Sanitation</option>
            <option>Safety</option>
            <option>Other</option>
          </select>
        </label>

        <label>
          <span class="muted">Details</span>
          <textarea name="details" required rows="6" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit"></textarea>
        </label>

        <label>
          <span class="muted">Attachments</span>
          <input type="file" name="attachments" multiple accept="image/*,.pdf" style="width:100%"/>
        </label>

        <div style="display:flex;gap:12px;justify-content:flex-end;">
          <button class="btn primary" type="submit">Submit Complaint</button>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <strong>Public Complaint Portal</strong>
        <p class="muted">Transparency · Accountability · Service</p>
      </div>
      <div class="footer-links">
        <a href="privacy-policy.html">Privacy</a>
        <a href="terms-of-service.html">Terms</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('complaintForm')?.addEventListener('submit', e => {
      e.preventDefault();
      alert('Complaint submitted (client stub). Implement API integration to save to backend.');
    });
  </script>
</body>
</html>
