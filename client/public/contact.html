<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Public Complaint Portal</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/app.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">
        <svg width="36" height="36" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zm0 7.8L4.6 7 12 3.8 19.4 7 12 9.8zM4 10.4v6.6C4 20 7 22 12 22s8-2 8-5V10.4l-8 4-8-4z"/>
        </svg>
        <span>Public Complaint Portal</span>
      </a>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="submit-complaint.html">Submit</a>
        <a href="user-login.html">User</a>
      </nav>

      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="container" style="padding-top:36px; padding-bottom:48px; max-width:760px;">
    <div class="card" style="padding:20px;">
      <h2 style="margin-top:0">Contact Us</h2>
      <p class="muted">Questions or support requests — get in touch.</p>

      <form id="contactForm" style="margin-top:12px;display:grid;gap:12px;">
        <input type="text" name="name" placeholder="Your name" required style="padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit"/>
        <input type="email" name="email" placeholder="Email" required style="padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit"/>
        <textarea name="message" rows="6" placeholder="Message" required style="padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit"></textarea>

        <div style="display:flex;justify-content:flex-end;">
          <button class="btn primary" type="submit">Send</button>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <strong>Public Complaint Portal</strong>
        <p class="muted">Transparency · Accountability · Service</p>
      </div>
      <div class="footer-links">
        <a href="privacy-policy.html">Privacy</a>
        <a href="terms-of-service.html">Terms</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('contactForm')?.addEventListener('submit', e => {
      e.preventDefault();
      alert('Message sent (client stub).');
    });
  </script>
</body>
</html>
